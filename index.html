<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetMetric Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>🚀 LeetMetric</h1>

  <div class="search-box">
    <input type="text" id="username" placeholder="Enter LeetCode Username">
    <button onclick="getData()">Analyze</button>
  </div>

  <p id="error" class="error"></p>

  <div id="dashboard" class="hidden">
    <div class="cards">
      <div class="card easy">
        <h2>Easy</h2>
        <p id="easy">0</p>
      </div>

      <div class="card medium">
        <h2>Medium</h2>
        <p id="medium">0</p>
      </div>

      <div class="card hard">
        <h2>Hard</h2>
        <p id="hard">0</p>
      </div>
    </div>

    <canvas id="myChart"></canvas>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
